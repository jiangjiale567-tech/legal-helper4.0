<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --primary-color: #1890ff;
            --primary-hover: #40a9ff;
            --success-color: #52c41a;
            --warning-color: #faad14;
            --danger-color: #ff4d4f;
            --text-main: #262626;
            --text-muted: #595959;
            --bg-body: #f5f7fa;
            --bg-card: #ffffff;
            --border-color: #f0f0f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.2rem;
            color: #0d1a26;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* 视图控制 */
        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* 技能看板网格 */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
        }

        .skill-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .skill-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 10px 20px rgba(24, 144, 255, 0.12);
            transform: translateY(-4px);
        }

        .skill-cmd {
            font-family: "Courier New", Courier, monospace;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 0.95rem;
            background: #e6f7ff;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 12px;
            align-self: flex-start;
        }

        .skill-card h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #1f1f1f;
        }

        .skill-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 100%;
            font-weight: 500;
            transition: background 0.2s;
            text-align: center;
            width: 100%;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #e8e8e8;
            color: #595959;
            margin-right: 12px;
            width: auto;
        }

        .btn-secondary:hover {
            background: #d9d9d9;
        }

        /* 面试向导框 */
        .interview-box {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 40px;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .progress-container {
            margin-bottom: 30px;
        }

        .progress-bar-bg {
            background: #f0f0f0;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .question-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #1f1f1f;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group textarea {
            width: 100%;
            height: 120px;
            padding: 14px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 1rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        .action-btns {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 结果交付面板 */
        .result-box {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .output-container {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 24px;
            font-family: -apple-system, var(--text-main);
            overflow-x: auto;
            white-space: pre-wrap;
        }

        /* Markdown轻量解析渲染样式 */
        .output-container h1 { font-size: 1.8rem; margin-bottom: 16px; border-bottom: 2px solid #ddd; padding-bottom: 8px;}
        .output-container h2 { font-size: 1.4rem; margin-top: 24px; margin-bottom: 12px; color: #333; }
        .output-container h3 { font-size: 1.1rem; margin-top: 16px; margin-bottom: 8px; }
        .output-container table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        .output-container th, .output-container td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; }
        .output-container th { background: #f1f5f9; }
        .output-container ul { margin-left: 24px; margin-bottom: 16px; }
        .output-container li { margin-bottom: 4px; }
    </style>
</head>

// 2. 核心状态机控制变量
let currentSkillId = '';
let currentQuestionIdx = 0;
let answersStorage = [];

// 3. 页面初始化渲染技能看板
function initDashboard() {
    const container = document.getElementById('skills-container');
    container.innerHTML = '';
    
    Object.keys(skillsRegistry).forEach(key => {
        const skill = skillsRegistry[key];
        const card = document.createElement('div');
        card.className = 'skill-card';
        card.innerHTML = `
            <div>
                <span class="skill-cmd">${skill.cmd}</span>
                <h3>${skill.name}</h3>
                <p>${skill.desc}</p>
            </div>
            <button class="btn" onclick="startInterview('${key}')">启动技能面试</button>
        `;
        container.appendChild(card);
    });
}

// 4. 视图路由控制
function switchView(viewId) {
    document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    window.scrollTo(0, 0);
}

function showGridView() {
    switchView('grid-view');
}

// 5. 启动冷启动问答面试流程
function startInterview(skillId) {
    currentSkillId = skillId;
    currentQuestionIdx = 0;
    answersStorage = [];
    
    const skill = skillsRegistry[skillId];
    document.getElementById('skill-display-name').innerText = `${skill.name} [${skill.cmd}]`;
    
    updateQuestionView();
    switchView('interview-view');
}

// 6. 问答视图动态更新
function updateQuestionView() {
    const skill = skillsRegistry[currentSkillId];
    const totalQuestions = skill.questions.length;
    
    // 更新进度条
    const progressPercent = (currentQuestionIdx / totalQuestions) * 100;
    document.getElementById('progress-fill').style.width = `${progressPercent}%`;
    document.getElementById('progress-step-text').innerText = `问题 ${currentQuestionIdx + 1} / ${totalQuestions}`;
    
    // 更新问题正文
    document.getElementById('question-text').innerText = skill.questions[currentQuestionIdx];
    
    // 恢复历史回填数据
    document.getElementById('answer-input').value = answersStorage[currentQuestionIdx] || '';
    
    // 按钮状态控制
    document.getElementById('prev-btn').style.visibility = currentQuestionIdx === 0 ? 'hidden' : 'visible';
    document.getElementById('next-btn').innerText = currentQuestionIdx === totalQuestions - 1 ? '一键生成交付物' : '下一步';
    document.getElementById('answer-input').focus();
}

// 7. 向前/向后步骤进退控制器
function nextQuestion() {
    const skill = skillsRegistry[currentSkillId];
    const currentAnswer = document.getElementById('answer-input').value.trim();
    
    // 允许留空，但做基础填充提示
    answersStorage[currentQuestionIdx] = currentAnswer || "用户选择跳过或未详细提供此项特定要素要素数据。";
    
    if (currentQuestionIdx < skill.questions.length - 1) {
        currentQuestionIdx++;
        updateQuestionView();
    } else {
        // 到达最后一步，执行交付物渲染
        renderDeliverable();
    }
}

function prevQuestion() {
    if (currentQuestionIdx > 0) {
        // 保存当前文本再后退
        answersStorage[currentQuestionIdx] = document.getElementById('answer-input').value.trim();
        currentQuestionIdx--;
        updateQuestionView();
    }
}

// 8. 渲染并交付结构化法律备忘录
function renderDeliverable() {
    const skill = skillsRegistry[currentSkillId];
    const rawMarkdown = skill.generator(answersStorage);
    
    // 解析最核心的基础Markdown语法（标题、表格、加粗、颜色高亮标签），保证前端优雅呈现
    let htmlOutput = rawMarkdown
        .replace(/^# (.*)$/gm, '<h1>$1</h1>')
        .replace(/^## (.*)$/gm, '<h2>$1</h2>')
        .replace(/^### (.*)$/gm, '<h3>$1</h3>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/🟢/g, '<span style="color:var(--success-color)">🟢</span>')
        .replace(/🟡/g, '<span style="color:var(--warning-color)">🟡</span>')
        .replace(/🔴/g, '<span style="color:var(--danger-color)">🔴</span>');

    // 处理表格渲染
    const lines = htmlOutput.split('\n');
    let inTable = false;
    let tableHtml = '';
    
    for (let i = 0; i < lines.length; i++) {
        if (lines[i].trim().startsWith('|')) {
            if (!inTable) {
                inTable = true;
                tableHtml = '<table>';
            }
            const cells = lines[i].split('|').map(c => c.trim()).filter((c, idx, arr) => idx > 0 && idx < arr.length - 1);
            if (lines[i].includes(':---') || lines[i].includes('---:')) {
                continue;
            }
            tableHtml += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
            lines[i] = ''; 
        } else {
            if (inTable) {
                inTable = false;
                tableHtml += '</table>';
                lines[i - 1] = tableHtml; 
            }
        }
    }
    
    htmlOutput = lines.filter(l => l !== '').join('\n');

    // 附带标准的法律免责声明声明尾部
    htmlOutput += `
        <hr style="margin:30px 0; border:0; border-top:1px solid var(--border-color);">
        <p style="color:var(--text-muted); font-size:0.85rem; font-style:italic;">
            ⚠️ <strong>免责声明：</strong>本工作区输出之报告系依据您提供的表单要素数据经AI模型规则引擎推演生成之法律结构草稿，不构成执业律师出具的正式法律意见书。对于重大资产股权设计、核心用工解雇诉讼或大额涉诉合同，建议委派公司法务或外部专业执业律师团队进行定向深度穿透审查。
        </p>
    `;

    // 缓存原始Markdown
    document.getElementById('output-content').setAttribute('data-raw-md', rawMarkdown);
    document.getElementById('output-content').innerHTML = htmlOutput;
    
    switchView('result-view');
}

// 9. 剪贴板复制增强工具
function copyOutput() {
    const rawMd = document.getElementById('output-content').getAttribute('data-raw-md');
    navigator.clipboard.writeText(rawMd.trim()).then(() => {
        alert('🎉 原始标准 Markdown 文本已成功复制至您的剪贴板，可直接粘贴至 Notion、飞书文档、语雀或 Word 中！');
    }).catch(err => {
        alert('复制失败，请手动选定文本进行复制。');
    });
}

// 自动引导看板加载
window.onload = initDashboard;
</script>
